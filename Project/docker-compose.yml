version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: hehe_mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=$MONGO_USER
      - MONGO_INITDB_ROOT_PASSWORD=$MONGO_PASS
      
  api:
    build: .
    container_name: hehe_api
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=$SECRET_KEY
      - MONGO_URI=$MONGO_URI   
