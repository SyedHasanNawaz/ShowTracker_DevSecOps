name: Build and Test API

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Adding Bandit Scanner
        run: |
          pip install bandit
          cd Project
          bandit -r . -ii
          
      - name: Build Docker Image
        run: |
          cd Project
          docker build --no-cache -t hehe .
          
      - name: Trivy Image Scan
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
          cd Project
          trivy image --exit-code 1 --severity HIGH,CRITICAL --format table hehe
          
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}    

      - name: Adding tag to an image
        run: docker tag hehe hasannawaz05/showtracker-api:latest
        
      - name: Pushing image to DockerHub
        run: docker push hehe hasannawaz05/showtracker-api:latest
        
      
      
