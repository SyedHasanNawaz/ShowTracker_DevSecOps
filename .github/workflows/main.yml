name: Build and Test API

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Adding Bandit Scanner
        uses: shundor/bandit-action@v1
        with: 
            path: "Project"
            level: high
            confidence: high
            exit_zero: false    
            
      - name: Build Docker Image
        run: |
          cd Project
          docker build -t hehe .
      
